<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 232" width="200" height="232">
  <!-- Hex sticker shape -->
  <polygon points="100,4 190,58 190,174 100,228 10,174 10,58"
           fill="#1a1a2e" stroke="#e94560" stroke-width="4"/>

  <!-- Inner hex border -->
  <polygon points="100,16 178,64 178,168 100,216 22,168 22,64"
           fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.4"/>

  <!-- Sigma symbol -->
  <text x="100" y="138" text-anchor="middle"
        font-family="serif" font-size="120" font-weight="bold"
        fill="#e94560">&#x03A3;</text>

  <!-- Package name -->
  <text x="100" y="195" text-anchor="middle"
        font-family="sans-serif" font-size="20" font-weight="bold"
        fill="white" letter-spacing="2">NESTIMATE</text>
</svg>
