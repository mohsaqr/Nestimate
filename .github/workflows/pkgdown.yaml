on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          # The cograph tutorials in vignettes/articles/*.qmd need
          # Quarto >= 1.5. Pinning to a recent stable release keeps the
          # tutorial render path reliable on the runner.
          version: '1.6.40'

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # `any::quarto` installs the R-side quarto package; the
          # quarto-dev/quarto-actions/setup step above gives us the CLI.
          # pkgdown::package_vignettes() loads the R quarto namespace when
          # walking *.qmd files in vignettes/articles, so without it the
          # whole site build fails before any article renders.
          # cograph-tutorial-nestimate.qmd calls dev-cograph functions
          # (csum/summarize_clusters/summarize_network) absent from the CRAN
          # cograph, so install cograph from GitHub here (kept out of
          # DESCRIPTION to leave the package CRAN-clean — no Remotes field).
          extra-packages: any::pkgdown, any::quarto, sonsoleslp/cograph, local::.
          needs: website

      - name: Render articles verbosely (surface quarto errors)
        run: |
          # build_site_github_pages calls build_articles with quiet = TRUE,
          # which swallows quarto stderr. Run articles first with quiet = FALSE
          # so any qmd render failure shows the real error in the CI log.
          pkgdown::build_articles(quiet = FALSE)
        shell: Rscript {0}

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE, clean = TRUE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          clean: false
          branch: gh-pages
          folder: docs
