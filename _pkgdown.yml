url: https://saqr.me/Nestimate/

template:
  bootstrap: 5

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]
reference:
  - title: Network Estimation
    desc: Core functions for building networks from data
    contents:
      - build_network
      - estimate_network
      - register_estimator
      - get_estimator
      - list_estimators
      - remove_estimator
      - build_tna
      - build_atna
      - build_ftna
      - build_cna
      - build_cor
      - build_pcor
      - build_glasso
      - build_ising
      - wtna
      - cooccurrence
      - build_mlvar
      - build_gimme

  - title: Bayesian Inference
    desc: >
      Dirichlet-Multinomial posterior inference for transition networks.
      `certainty()` is the closed-form counterpart of `bootstrap_network()`;
      `bayes_compare()` is the complement of `permutation()`.
    contents:
      - certainty
      - bayes_compare
      - subtract_networks
      - as_netdifference

  - title: Higher-Order Networks
    desc: Methods for capturing higher-order dependencies
    contents:
      - build_hon
      - build_honem
      - build_hypa
      - build_mogen
      - pathways
      - mogen_transitions
      - path_counts
      - bipartite_groups
      - clique_expansion
      - hypergraph_centrality
      - build_hypergraph
      - hypergraph_measures

  - title: Markov Analysis
    desc: Order, structure, entropy, and stability of Markov chains
    contents:
      - chain_structure
      - markov_order_test
      - markov_stability
      - passage_time
      - path_dependence
      - transition_entropy

  - title: Network Pruning
    desc: Non-destructive edge pruning and restoration
    contents:
      - net_prune
      - net_deprune
      - net_reprune
      - net_pruning_details

  - title: Bootstrap & Inference
    desc: Statistical inference for network estimation
    contents:
      - bootstrap_network
      - vertex_bootstrap
      - vertex_compare
      - boot_glasso
      - permutation
      - nct
      - compare_model
      - compare_model.netobject_group
      - rename_models
      - magnitude_difference

  - title: Reliability & Stability
    desc: Assess reliability and stability of network estimates
    contents:
      - network_reliability
      - casedrop_reliability
      - centrality_stability
      - loading_stability

  - title: Clustering & Grouping
    desc: Cluster-based and multilevel network analysis
    contents:
      - build_clusters
      - cluster_data
      - cluster_choice
      - cluster_diagnostics
      - cluster_summary
      - cluster_mmm
      - cluster_network
      - build_mcml
      - build_mcml_pc
      - build_mmm
      - compare_mmm

  - title: Simplicial Complex Analysis
    desc: Topological analysis of networks
    contents:
      - build_simplicial
      - persistent_homology
      - bottleneck_distance
      - persistence_landscape
      - q_analysis
      - betti_numbers
      - euler_characteristic
      - simplicial_degree
      - verify_simplicial

  - title: Data Preparation
    desc: Convert and prepare data for network estimation
    contents:
      - prepare
      - prepare_for_tna
      - action_to_onehot
