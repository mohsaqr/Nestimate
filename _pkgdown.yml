url: https://mohsaqr.github.io/Nestimate/

template:
  bootstrap: 5

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]
reference:
  - title: Network Estimation
    desc: Core functions for building networks from data
    contents:
      - build_network
      - estimate_network
      - register_estimator
      - get_estimator
      - list_estimators
      - remove_estimator
      - build_tna
      - build_atna
      - build_ftna
      - build_cna
      - build_cor
      - build_pcor
      - build_glasso
      - build_ising
      - wtna
      - cooccurrence
      - build_mlvar
      - build_gimme

  - title: Higher-Order Networks
    desc: Methods for capturing higher-order dependencies
    contents:
      - build_hon
      - build_honem
      - build_hypa
      - build_mogen
      - pathways
      - mogen_transitions
      - path_counts
      - bipartite_groups
      - clique_expansion
      - hypergraph_centrality

  - title: Markov Analysis
    desc: Order, structure, entropy, and stability of Markov chains
    contents:
      - chain_structure
      - markov_order_test
      - markov_stability
      - passage_time
      - path_dependence
      - transition_entropy

  - title: Bootstrap & Inference
    desc: Statistical inference for network estimation
    contents:
      - bootstrap_network
      - boot_glasso
      - permutation
      - nct

  - title: Reliability & Stability
    desc: Assess reliability and stability of network estimates
    contents:
      - network_reliability
      - centrality_stability

  - title: Clustering & Grouping
    desc: Cluster-based and multilevel network analysis
    contents:
      - build_clusters
      - cluster_choice
      - cluster_diagnostics
      - cluster_summary
      - cluster_mmm
      - cluster_network
      - build_mcml
      - build_mmm
      - compare_mmm

  - title: Simplicial Complex Analysis
    desc: Topological analysis of networks
    contents:
      - build_simplicial
      - persistent_homology
      - q_analysis
      - betti_numbers
      - euler_characteristic
      - simplicial_degree
      - verify_simplicial

  - title: Data Preparation
    desc: Convert and prepare data for network estimation
    contents:
      - prepare
      - prepare_for_tna
      - action_to_onehot
      - prepare_onehot
      - wide_to_long
      - long_to_wide
      - convert_sequence_format
      - actor_endpoints
      - mark_first_state
      - mark_terminal_state

  - title: Utilities
    desc: Helper functions and extractors
    contents:
      - predictability
      - frequencies
      - state_frequencies
      - net_aggregate_weights
      - net_centrality
      - coefs
      - as_tna
      - extract_edges
      - extract_initial_probs
      - extract_transition_matrix

  - title: Sequence Analysis
    desc: Sequence visualization, pattern comparison, and association mining
    contents:
      - sequence_plot
      - distribution_plot
      - plot_state_frequencies
      - plot_mosaic
      - sequence_compare
      - association_rules

  - title: Link Prediction
    desc: Predict and evaluate missing connections
    contents:
      - predict_links
      - evaluate_links

  - title: Data
    desc: Example datasets
    contents:
      - ai_long
      - human_long
      - srl_strategies
      - learning_activities
      - group_regulation_long
      - chatgpt_srl
      - trajectories

  - title: S3 Methods
    desc: Print, summary, and plot methods for package classes
    contents:
      - starts_with("print.")
      - starts_with("summary.")
      - starts_with("plot.")

authors:
  Mohammed Saqr:
    href: https://saqr.me
  Sonsoles López-Pernas:
    href: https://sonsoles.me

articles:
- title: Articles
  navbar: ~
  contents:
  - starts_with("transition")
  - starts_with("sequence")
  - starts_with("clustering")
  - starts_with("markov")

- title: Tutorials
  desc: Full tutorials
  contents:
  - starts_with("articles/cograph-tutorial-nestimate")
  - starts_with("articles/cograph-tutorial-simplicial")
  - starts_with("articles/cograph-tutorial-mcml")

