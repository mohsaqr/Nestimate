      - net_aggregate_weights
      - net_centrality
      - net_edge_betweenness
      - coefs
      - as_tna
      - as_htna
      - as_networks
      - as_netobject
      - validate_netobject
      - extract_edges
      - extract_initial_probs
      - extract_transition_matrix

  - title: Sequence Analysis
    desc: Sequence visualization, pattern comparison, and association mining
    contents:
      - sequence_plot
      - distribution_plot
      - plot_state_frequencies
      - state_distribution
      - plot_mosaic
      - mosaic_plot
      - mosaic_analysis
      - sequence_compare
      - association_rules

  - title: Link Prediction
    desc: Predict and evaluate missing connections
    contents:
      - predict_links
      - evaluate_links

  - title: Data
    desc: Example datasets
    contents:
      - ai_long
      - human_long
      - srl_strategies
      - learning_activities
      - group_regulation_long
      - chatgpt_srl
      - trajectories

  - title: S3 Methods
    desc: Print, summary, and plot methods for package classes
    contents:
      - starts_with("print.")
      - starts_with("summary.")
      - starts_with("plot.")

